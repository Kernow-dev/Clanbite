name: Plugin Check

on:
  pull_request:
  push:
    branches:
      - main
      - feat/**

jobs:
  plugin-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Plugin Check
        uses: wordpress/plugin-check-action@v1
        with:
          build-dir: ./
          slug: clanbite
          exclude-directories: |
            node_modules
            vendor
