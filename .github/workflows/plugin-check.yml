name: Plugin Check

on:
  pull_request:
  push:
    branches:
      - main
      - feat/**

jobs:
  plugin-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # plugin-check-action copies this directory into wp-env; vendor/ is gitignored so we must
      # generate Composer autoload here (there are no runtime Composer packages — only autoload maps).
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer

      - name: Composer install (autoload only, no dev tools)
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Run Plugin Check
        uses: wordpress/plugin-check-action@v1
        with:
          build-dir: ./
          slug: clanbite
          exclude-directories: |
            node_modules
