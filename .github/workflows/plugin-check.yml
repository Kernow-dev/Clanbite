name: Plugin Check

on:
  pull_request:
  push:
    branches:
      - main
      - feat/**

jobs:
  plugin-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # plugin-check-action scans the entire build-dir tree; GitHub copies (.git, .github),
      # dotfiles (e.g. .gitignore), and repo-only markdown trip Plugin Check policy checks.
      # Mirror the paths excluded by `.distignore`, then point Plugin Check at that staging folder.
      #
      # Build artefacts (`build/`, `assets/dist/`) are gitignored locally but required for a
      # faithful distribution scan — generate them before staging.

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer

      - name: Composer install (autoload only, no dev tools)
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install npm dependencies and build production assets
        run: |
          npm ci
          npm run build:production

      - name: Stage plugin directory for Plugin Check
        run: |
          mkdir -p plugin-check-staging/clanbite
          rsync -a \
            --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='node_modules/' \
            --exclude='plugin-check-staging/' \
            --exclude='src/' \
            --exclude='scripts/' \
            --exclude='tests/' \
            --exclude='*.zip' \
            --exclude='package.json' \
            --exclude='package-lock.json' \
            --exclude='webpack.config.cjs' \
            --exclude='.eslintrc*' \
            --exclude='.prettier*' \
            --exclude='phpcs.xml' \
            --exclude='phpcs.xml.dist' \
            --exclude='phpstan.neon' \
            --exclude='phpstan.neon.dist' \
            --exclude='phpstan-bootstrap.php' \
            --exclude='.editorconfig' \
            --exclude='AGENTS.md' \
            --exclude='.gitignore' \
            --exclude='.distignore' \
            --exclude='.cursor/' \
            --exclude='.idea/' \
            ./ plugin-check-staging/clanbite/

      - name: Run Plugin Check
        uses: wordpress/plugin-check-action@v1
        with:
          build-dir: ./plugin-check-staging/clanbite
          slug: clanbite
          exclude-directories: |
            node_modules
